services:
  # Restricts the Docker API to exactly the verbs the orchestrator needs.
  # Never mount the real Docker socket into the orchestrator (or anywhere
  # else) directly — this proxy is the only thing that touches it.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: lab-docker-socket-proxy
    restart: unless-stopped
    environment:
      # Read/list access needed to manage lab containers and networks.
      CONTAINERS: 1
      NETWORKS: 1
      IMAGES: 1
      # Write access, scoped down to just what's needed below.
      POST: 1
      ALLOW_START: 1
      ALLOW_STOP: 1
      ALLOW_RESTARTS: 0
      # Explicitly denied — no interactive exec, no builds, no swarm/system
      # control, no volumes, no secrets. Keep this list denied-by-default.
      EXEC: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      GRPC: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SESSION: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orchestrator-internal
    # No published ports — only reachable by the orchestrator service on
    # the internal network.

  orchestrator:
    build: ./src
    container_name: lab-orchestrator
    restart: unless-stopped
    environment:
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      WAZUH_MANAGER_SERVER: wazuh.manager
      WAZUH_API_URL: https://wazuh.manager:55000
      WAZUH_API_USER: ${WAZUH_API_USER}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD}
      LAB_NETWORK_PREFIX: lab-net
    depends_on:
      - docker-socket-proxy
    networks:
      - orchestrator-internal
      - single-node_default
    ports:
      # Internal-only in intent: bound to loopback so only the dashboard
      # process on this same host can reach it, never the public internet.
      - "127.0.0.1:4100:4100"

networks:
  orchestrator-internal:
  single-node_default:
    external: true
